<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 840">
  <title id="title">Human and Agent Development System Layers</title>
  <desc id="desc">A layered AI-native development system where humans provide intent and review, agents execute, and workflow, context, repository contracts, code ownership, and evidence constrain the work.</desc>
  <defs>
    <linearGradient id="page-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9fbfc"/>
      <stop offset="1" stop-color="#eef3f0"/>
    </linearGradient>
    <marker id="arrow" markerHeight="12" markerWidth="12" orient="auto" refX="9" refY="5" viewBox="0 0 10 10">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { fill: #0f172a; font: 760 38px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #64748b; font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small-label { fill: #64748b; font: 760 13px Inter, ui-sans-serif, system-ui, sans-serif; text-transform: uppercase; }
      .node-title { fill: #0f172a; font: 760 22px Inter, ui-sans-serif, system-ui, sans-serif; }
      .node-body { fill: #475569; font: 500 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .layer-id { fill: #ffffff; font: 780 13px Inter, ui-sans-serif, system-ui, sans-serif; }
      .layer-title { fill: #0f172a; font: 760 21px Inter, ui-sans-serif, system-ui, sans-serif; }
      .layer-body { fill: #475569; font: 500 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .note { fill: #334155; font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .note-inverse { fill: #ffffff; font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="840" fill="url(#page-bg)"/>
  <text class="title" x="74" y="70">Human + Agent Development System</text>
  <text class="subtitle" x="76" y="103">Humans steer and review. Agents execute. The system constrains, records, and verifies the work.</text>

  <g transform="translate(88 132)">
    <rect width="440" height="92" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="0" width="8" height="92" rx="8" fill="#4263eb"/>
    <text class="small-label" x="30" y="34">Human layer</text>
    <text class="node-title" x="30" y="62">Intent, Decisions, Review</text>
    <text class="node-body" x="30" y="84">Briefs, tradeoffs, accountability, PR feedback</text>
  </g>

  <g transform="translate(672 132)">
    <rect width="440" height="92" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="0" width="8" height="92" rx="8" fill="#18a999"/>
    <text class="small-label" x="30" y="34">Agent layer</text>
    <text class="node-title" x="30" y="62">Execution, Tool Calls, Checks</text>
    <text class="node-body" x="30" y="84">Code edits, terminal commands, explanations</text>
  </g>

  <path d="M308 228 L308 263" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M892 228 L892 263" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M308 262 H892" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>

  <g transform="translate(150 276)">
    <rect width="900" height="82" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="0" width="10" height="82" rx="8" fill="#4263eb"/>
    <circle cx="48" cy="41" r="18" fill="#4263eb"/>
    <text class="layer-id" x="36" y="46">01</text>
    <text class="layer-title" x="84" y="36">Workflow Orchestration</text>
    <text class="layer-body" x="84" y="62">CLI, pipeline, state machine, gates, runner selection</text>
    <text class="layer-body" x="620" y="48">Selects mode and enforces the method</text>
  </g>

  <path d="M600 360 L600 384" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g transform="translate(150 390)">
    <rect width="900" height="82" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="0" width="10" height="82" rx="8" fill="#f4a62a"/>
    <circle cx="48" cy="41" r="18" fill="#f4a62a"/>
    <text class="layer-id" x="36" y="46">02</text>
    <text class="layer-title" x="84" y="36">Plan &amp; Context Compiler</text>
    <text class="layer-body" x="84" y="62">Spec, plan, tracker, task packets, stop conditions</text>
    <text class="layer-body" x="620" y="48">Turns intent into scoped context</text>
  </g>

  <path d="M600 474 L600 498" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g transform="translate(150 504)">
    <rect width="900" height="82" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="0" width="10" height="82" rx="8" fill="#18a999"/>
    <circle cx="48" cy="41" r="18" fill="#18a999"/>
    <text class="layer-id" x="36" y="46">03</text>
    <text class="layer-title" x="84" y="36">Repository Contract</text>
    <text class="layer-body" x="84" y="62">AGENTS.md, protected paths, commands, policies, validation hooks</text>
    <text class="layer-body" x="620" y="48">Makes rules machine-readable</text>
  </g>

  <path d="M600 588 L600 612" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>

  <g transform="translate(150 618)">
    <rect width="900" height="114" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="0" width="10" height="114" rx="8" fill="#ef6b5a"/>
    <circle cx="48" cy="57" r="18" fill="#ef6b5a"/>
    <text class="layer-id" x="36" y="62">04</text>
    <text class="layer-title" x="84" y="34">Code Ownership Layer</text>
    <text class="layer-body" x="84" y="58">Separates upgradeable foundation from daily product work</text>

    <g transform="translate(84 72)">
      <rect width="370" height="34" rx="8" fill="#fff4ed" stroke="#f4b99e"/>
      <text class="note" x="16" y="15">Forge-owned Foundation</text>
      <text class="layer-body" x="16" y="29">Stack, templates, scripts, base components</text>
    </g>
    <g transform="translate(484 72)">
      <rect width="370" height="34" rx="8" fill="#edfdf8" stroke="#9edfd5"/>
      <text class="note" x="16" y="15">Project-owned Product</text>
      <text class="layer-body" x="16" y="29">Features, APIs, screens, business rules</text>
    </g>
  </g>

  <path d="M966 775 C1126 775 1132 286 1036 286" fill="none" stroke="#64748b" stroke-width="2.4" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <g transform="translate(908 372)">
    <rect width="200" height="52" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <text class="small-label" x="18" y="24">Feedback loop</text>
    <text class="node-body" x="18" y="43">Evidence returns to review</text>
  </g>

  <g transform="translate(234 754)">
    <rect width="732" height="42" rx="8" fill="#0f172a"/>
    <text class="layer-id" x="28" y="27">05</text>
    <text class="note-inverse" x="72" y="27">Evidence &amp; Review: tests, logs, final spec, PR summary, decisions</text>
  </g>
</svg>
