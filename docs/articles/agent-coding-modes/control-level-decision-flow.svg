<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Choosing the Minimum Control Level</title>
  <desc id="desc">A decision flow moves from the request through escalation signals and five non-scored dimensions to the dominant risk, the mode and path, and the responsible decision authority.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"/>
      <feOffset in="blur" dx="0" dy="5" result="offsetBlur"/>
      <feFlood flood-color="#07162d" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadowShape"/>
      <feMerge>
        <feMergeNode in="shadowShape"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L12 6L0 12Z" fill="#07162d"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <text x="80" y="91" font-family="Noto Sans, sans-serif" font-size="54" font-weight="700" fill="#07162d">Choosing the Minimum Control Level</text>
  <text x="82" y="142" font-family="Noto Sans, sans-serif" font-size="28" fill="#07162d">Choose the lightest path compatible with the most constraining fact.</text>

  <!-- Step 1: request -->
  <g filter="url(#shadow)">
    <rect x="80" y="205" width="300" height="165" rx="22" fill="#f7f9fc" stroke="#2f6fdd" stroke-width="3"/>
    <circle cx="120" cy="246" r="25" fill="#ffffff" stroke="#2f6fdd" stroke-width="3"/>
    <text x="120" y="255" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">01</text>
    <text x="160" y="255" font-family="Noto Sans, sans-serif" font-size="28" font-weight="700" fill="#07162d">REQUEST</text>
    <line x1="110" y1="278" x2="350" y2="278" stroke="#d9e1ec" stroke-width="2"/>
    <text x="110" y="318" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Observable change</text>
    <text x="110" y="350" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Initial scope</text>
  </g>

  <path d="M400 287H440" fill="none" stroke="#07162d" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 2: escalation signals -->
  <g filter="url(#shadow)">
    <rect x="460" y="205" width="1060" height="165" rx="22" fill="#f7f9fc" stroke="#f47b20" stroke-width="3"/>
    <circle cx="500" cy="246" r="25" fill="#ffffff" stroke="#f47b20" stroke-width="3"/>
    <text x="500" y="255" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">02</text>
    <text x="540" y="255" font-family="Noto Sans, sans-serif" font-size="28" font-weight="700" fill="#07162d">ESCALATION SIGNALS</text>

    <rect x="490" y="275" width="310" height="38" rx="19" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <text x="645" y="302" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Security &amp; sensitive data</text>
    <rect x="820" y="275" width="310" height="38" rx="19" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <text x="975" y="302" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Migration &amp; deletion</text>
    <rect x="1150" y="275" width="340" height="38" rx="19" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <text x="1320" y="302" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">External contracts</text>

    <rect x="490" y="322" width="310" height="38" rx="19" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <text x="645" y="349" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Shared foundation</text>
    <rect x="820" y="322" width="310" height="38" rx="19" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <text x="975" y="349" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">New infrastructure</text>
    <rect x="1150" y="322" width="340" height="38" rx="19" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <text x="1320" y="349" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Irreversible effects</text>
  </g>

  <path d="M990 385V405" fill="none" stroke="#07162d" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 3: five dimensions -->
  <g filter="url(#shadow)">
    <rect x="80" y="420" width="1440" height="210" rx="24" fill="#ffffff" stroke="#7a4fd3" stroke-width="3"/>
    <circle cx="120" cy="459" r="25" fill="#ffffff" stroke="#7a4fd3" stroke-width="3"/>
    <text x="120" y="468" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">03</text>
    <text x="160" y="468" font-family="Noto Sans, sans-serif" font-size="28" font-weight="700" fill="#07162d">FIVE DIMENSIONS</text>
    <rect x="1135" y="437" width="350" height="43" rx="21" fill="#f7f9fc" stroke="#7a4fd3" stroke-width="2"/>
    <text x="1310" y="466" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">DISCUSS · DO NOT AVERAGE</text>

    <rect x="105" y="496" width="264" height="108" rx="18" fill="#f7f9fc" stroke="#d9e1ec" stroke-width="2"/>
    <rect x="105" y="496" width="264" height="8" rx="4" fill="#2f6fdd"/>
    <circle cx="145" cy="550" r="23" fill="#ffffff" stroke="#2f6fdd" stroke-width="3"/>
    <text x="145" y="559" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">1</text>
    <text x="184" y="559" font-family="Noto Sans, sans-serif" font-size="26" font-weight="700" fill="#07162d">Scope</text>

    <rect x="386" y="496" width="264" height="108" rx="18" fill="#f7f9fc" stroke="#d9e1ec" stroke-width="2"/>
    <rect x="386" y="496" width="264" height="8" rx="4" fill="#1f9d66"/>
    <circle cx="426" cy="550" r="23" fill="#ffffff" stroke="#1f9d66" stroke-width="3"/>
    <text x="426" y="559" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">2</text>
    <text x="465" y="559" font-family="Noto Sans, sans-serif" font-size="26" font-weight="700" fill="#07162d">Ambiguity</text>

    <rect x="667" y="496" width="264" height="108" rx="18" fill="#f7f9fc" stroke="#d9e1ec" stroke-width="2"/>
    <rect x="667" y="496" width="264" height="8" rx="4" fill="#7a4fd3"/>
    <circle cx="707" cy="550" r="23" fill="#ffffff" stroke="#7a4fd3" stroke-width="3"/>
    <text x="707" y="559" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">3</text>
    <text x="746" y="559" font-family="Noto Sans, sans-serif" font-size="25" font-weight="700" fill="#07162d">Reversibility</text>

    <rect x="948" y="496" width="264" height="108" rx="18" fill="#f7f9fc" stroke="#d9e1ec" stroke-width="2"/>
    <rect x="948" y="496" width="264" height="8" rx="4" fill="#f47b20"/>
    <circle cx="988" cy="550" r="23" fill="#ffffff" stroke="#f47b20" stroke-width="3"/>
    <text x="988" y="559" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">4</text>
    <text x="1027" y="543" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">Surfaces &amp;</text>
    <text x="1027" y="574" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">contracts</text>

    <rect x="1229" y="496" width="264" height="108" rx="18" fill="#f7f9fc" stroke="#d9e1ec" stroke-width="2"/>
    <rect x="1229" y="496" width="264" height="8" rx="4" fill="#2f6fdd"/>
    <circle cx="1269" cy="550" r="23" fill="#ffffff" stroke="#2f6fdd" stroke-width="3"/>
    <text x="1269" y="559" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">5</text>
    <text x="1308" y="543" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">Decision</text>
    <text x="1308" y="574" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">authority</text>
  </g>

  <path d="M285 645V665" fill="none" stroke="#07162d" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Steps 4–6: outcome -->
  <g filter="url(#shadow)">
    <rect x="80" y="680" width="410" height="145" rx="22" fill="#f7f9fc" stroke="#f47b20" stroke-width="3"/>
    <circle cx="120" cy="721" r="25" fill="#ffffff" stroke="#f47b20" stroke-width="3"/>
    <text x="120" y="730" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">04</text>
    <text x="160" y="730" font-family="Noto Sans, sans-serif" font-size="27" font-weight="700" fill="#07162d">DOMINANT RISK</text>
    <text x="110" y="778" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Most constraining factor</text>
    <text x="110" y="810" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">sets the minimum</text>

    <rect x="595" y="680" width="410" height="145" rx="22" fill="#f7f9fc" stroke="#1f9d66" stroke-width="3"/>
    <circle cx="635" cy="721" r="25" fill="#ffffff" stroke="#1f9d66" stroke-width="3"/>
    <text x="635" y="730" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">05</text>
    <text x="675" y="730" font-family="Noto Sans, sans-serif" font-size="27" font-weight="700" fill="#07162d">MODE + PATH</text>
    <text x="625" y="778" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Choose the lightest</text>
    <text x="625" y="810" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">compatible path</text>

    <rect x="1110" y="680" width="410" height="145" rx="22" fill="#f7f9fc" stroke="#7a4fd3" stroke-width="3"/>
    <circle cx="1150" cy="721" r="25" fill="#ffffff" stroke="#7a4fd3" stroke-width="3"/>
    <text x="1150" y="730" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="24" font-weight="700" fill="#07162d">06</text>
    <text x="1190" y="730" font-family="Noto Sans, sans-serif" font-size="27" font-weight="700" fill="#07162d">AUTHORITY</text>
    <text x="1140" y="778" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">Name the decision owner</text>
    <text x="1140" y="810" font-family="Noto Sans, sans-serif" font-size="24" fill="#07162d">and reassessment facts</text>
  </g>

  <path d="M510 752H575" fill="none" stroke="#07162d" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1025 752H1090" fill="none" stroke="#07162d" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="150" y1="865" x2="420" y2="865" stroke="#d9e1ec" stroke-width="2"/>
  <line x1="1180" y1="865" x2="1450" y2="865" stroke="#d9e1ec" stroke-width="2"/>
  <text x="800" y="875" text-anchor="middle" font-family="Noto Sans, sans-serif" font-size="28" font-weight="700" fill="#07162d">No score. No average. Keep the constraining fact visible.</text>
</svg>
