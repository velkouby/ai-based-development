<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">From Request to Reviewable Evidence</title>
  <desc id="desc">An end-to-end chain across Human, Workflow, and Agent lanes. The agent proposes, the workflow observes, and the human decides.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#07162d"/>
    </marker>
    <style>
      .text { font-family: "Noto Sans", sans-serif; fill: #07162d; }
      .title { font-size: 54px; font-weight: 700; letter-spacing: -1.2px; }
      .subtitle { font-size: 26px; font-weight: 400; fill: #33435c; }
      .lane-title { font-size: 28px; font-weight: 700; }
      .lane-role { font-size: 24px; font-weight: 700; letter-spacing: 1.5px; }
      .card-label { font-size: 24px; font-weight: 700; text-anchor: middle; }
      .role-title { font-size: 26px; font-weight: 700; }
      .role-label { font-size: 24px; font-weight: 700; letter-spacing: 1.2px; }
      .takeaway { font-size: 25px; font-weight: 600; text-anchor: middle; }
      .lane { fill: #f7f9fc; stroke: #d9e1ec; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #d9e1ec; stroke-width: 2; }
      .flow { fill: none; stroke: #07162d; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <text class="text title" x="72" y="78">From Request to Reviewable Evidence</text>
  <text class="text subtitle" x="74" y="120">A durable workflow turns intent into bounded execution, observed facts, and a human decision.</text>

  <!-- Three responsibility lanes -->
  <rect class="lane" x="62" y="166" width="1476" height="148" rx="24"/>
  <rect x="62" y="166" width="10" height="148" rx="5" fill="#2f6fdd"/>
  <rect class="lane" x="62" y="336" width="1476" height="148" rx="24"/>
  <rect x="62" y="336" width="10" height="148" rx="5" fill="#1f9d66"/>
  <rect class="lane" x="62" y="506" width="1476" height="148" rx="24"/>
  <rect x="62" y="506" width="10" height="148" rx="5" fill="#f47b20"/>

  <text class="text lane-title" x="92" y="225">HUMAN</text>
  <text class="text lane-role" x="92" y="260" fill="#2f6fdd">DECISION</text>
  <text class="text lane-title" x="92" y="395">WORKFLOW</text>
  <text class="text lane-role" x="92" y="430" fill="#1f9d66">OBSERVATION</text>
  <text class="text lane-title" x="92" y="565">AGENT</text>
  <text class="text lane-role" x="92" y="600" fill="#f47b20">PROPOSAL</text>

  <!-- Flow arrows sit behind the cards -->
  <path class="flow" d="M355 240 H375"/>
  <path class="flow" d="M500 240 H510 V410 H520"/>
  <path class="flow" d="M645 410 H665"/>
  <path class="flow" d="M790 410 H800 V580 H810"/>
  <path class="flow" d="M935 580 H945 V410 H955"/>
  <path class="flow" d="M1080 410 H1100"/>
  <path class="flow" d="M1225 410 H1245"/>
  <path class="flow" d="M1370 410 H1380 V240 H1390"/>

  <!-- Human cards -->
  <g>
    <rect class="card" x="230" y="185" width="125" height="110" rx="18"/>
    <rect x="230" y="185" width="125" height="8" rx="4" fill="#2f6fdd"/>
    <circle cx="292.5" cy="214" r="10" fill="#ffffff" stroke="#2f6fdd" stroke-width="4"/>
    <text class="text card-label" x="292.5" y="249"><tspan x="292.5">Raw</tspan><tspan x="292.5" dy="29">request</tspan></text>
  </g>
  <g>
    <rect class="card" x="375" y="185" width="125" height="110" rx="18"/>
    <rect x="375" y="185" width="125" height="8" rx="4" fill="#2f6fdd"/>
    <path d="M430 209 h15 v15 h-15 z M434 214 h7 M434 219 h7" fill="none" stroke="#2f6fdd" stroke-width="3" stroke-linecap="round"/>
    <text class="text card-label" x="437.5" y="249"><tspan x="437.5">Clarified</tspan><tspan x="437.5" dy="29">brief</tspan></text>
  </g>
  <g>
    <rect class="card" x="1390" y="185" width="125" height="110" rx="18"/>
    <rect x="1390" y="185" width="125" height="8" rx="4" fill="#2f6fdd"/>
    <path d="M1443 215 l7 7 14-16" fill="none" stroke="#2f6fdd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="text card-label" x="1452.5" y="249"><tspan x="1452.5">Human</tspan><tspan x="1452.5" dy="29">review</tspan></text>
  </g>

  <!-- Workflow cards -->
  <g>
    <rect class="card" x="520" y="355" width="125" height="110" rx="18"/>
    <rect x="520" y="355" width="125" height="8" rx="4" fill="#1f9d66"/>
    <path d="M573 382 h19 M573 390 h13" fill="none" stroke="#1f9d66" stroke-width="4" stroke-linecap="round"/>
    <text class="text card-label" x="582.5" y="419"><tspan x="582.5">Bounded</tspan><tspan x="582.5" dy="29">plan</tspan></text>
  </g>
  <g>
    <rect class="card" x="665" y="355" width="125" height="110" rx="18"/>
    <rect x="665" y="355" width="125" height="8" rx="4" fill="#7a4fd3"/>
    <path d="M719 380 h18 l7 7 v15 h-25 z M737 380 v8 h7" fill="none" stroke="#7a4fd3" stroke-width="3" stroke-linejoin="round"/>
    <text class="text card-label" x="727.5" y="419"><tspan x="727.5">Execution</tspan><tspan x="727.5" dy="29">package</tspan></text>
  </g>
  <g>
    <rect class="card" x="955" y="355" width="125" height="110" rx="18"/>
    <rect x="955" y="355" width="125" height="8" rx="4" fill="#1f9d66"/>
    <path d="M1010 390 l8 8 15-18" fill="none" stroke="#1f9d66" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="text card-label" x="1017.5" y="419"><tspan x="1017.5">Scope</tspan><tspan x="1017.5" dy="29">check</tspan></text>
  </g>
  <g>
    <rect class="card" x="1100" y="355" width="125" height="110" rx="18"/>
    <rect x="1100" y="355" width="125" height="8" rx="4" fill="#1f9d66"/>
    <path d="M1150 391 l7 7 16-19 M1171 391 l6 6 10-12" fill="none" stroke="#1f9d66" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="text card-label" x="1162.5" y="429">Validations</text>
  </g>
  <g>
    <rect class="card" x="1245" y="355" width="125" height="110" rx="18"/>
    <rect x="1245" y="355" width="125" height="8" rx="4" fill="#7a4fd3"/>
    <path d="M1298 380 h20 v23 h-20 z M1303 387 h10 M1303 394 h10" fill="none" stroke="#7a4fd3" stroke-width="3" stroke-linecap="round"/>
    <text class="text card-label" x="1307.5" y="419"><tspan x="1307.5">Local</tspan><tspan x="1307.5" dy="29">evidence</tspan></text>
  </g>

  <!-- Agent card -->
  <g>
    <rect class="card" x="810" y="525" width="125" height="110" rx="18"/>
    <rect x="810" y="525" width="125" height="8" rx="4" fill="#f47b20"/>
    <path d="M854 563 l-8 8 8 8 M891 563 l8 8-8 8 M880 558 l-13 27" fill="none" stroke="#f47b20" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="text card-label" x="872.5" y="589"><tspan x="872.5">Code</tspan><tspan x="872.5" dy="29">proposal</tspan></text>
  </g>

  <!-- Responsibility chain -->
  <rect x="150" y="704" width="1300" height="116" rx="24" fill="#f7f9fc" stroke="#d9e1ec" stroke-width="2"/>
  <g transform="translate(230 721)">
    <rect width="310" height="82" rx="18" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <rect width="9" height="82" rx="4" fill="#f47b20"/>
    <text class="text role-title" x="34" y="34">AGENT</text>
    <text class="text role-label" x="34" y="66" fill="#f47b20">PROPOSAL</text>
  </g>
  <path d="M570 762 H625" fill="none" stroke="#07162d" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <g transform="translate(655 721)">
    <rect width="310" height="82" rx="18" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <rect width="9" height="82" rx="4" fill="#1f9d66"/>
    <text class="text role-title" x="34" y="34">WORKFLOW</text>
    <text class="text role-label" x="34" y="66" fill="#1f9d66">OBSERVATION</text>
  </g>
  <path d="M995 762 H1050" fill="none" stroke="#07162d" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <g transform="translate(1080 721)">
    <rect width="290" height="82" rx="18" fill="#ffffff" stroke="#d9e1ec" stroke-width="2"/>
    <rect width="9" height="82" rx="4" fill="#2f6fdd"/>
    <text class="text role-title" x="34" y="34">HUMAN</text>
    <text class="text role-label" x="34" y="66" fill="#2f6fdd">DECISION</text>
  </g>

  <text class="text takeaway" x="800" y="865">No single stage proves the feature; each stage narrows what can legitimately be claimed.</text>
</svg>
