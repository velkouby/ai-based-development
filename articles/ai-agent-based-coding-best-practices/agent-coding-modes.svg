<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 720">
  <title id="title">Four Agent Coding Modes</title>
  <desc id="desc">A four-level scale for agent-based coding, from controlled vibe coding to foundation evolution, with increasing structure, risk, and evidence.</desc>
  <defs>
    <linearGradient id="page-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef4f7"/>
    </linearGradient>
    <marker id="arrow" markerHeight="14" markerWidth="14" orient="auto" refX="10" refY="5" viewBox="0 0 10 10">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { fill: #0f172a; font: 760 39px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #64748b; font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .axis-label { fill: #475569; font: 720 15px Inter, ui-sans-serif, system-ui, sans-serif; text-transform: uppercase; }
      .card-title { fill: #0f172a; font: 760 22px Inter, ui-sans-serif, system-ui, sans-serif; }
      .level { fill: #ffffff; font: 780 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #334155; font: 760 14px Inter, ui-sans-serif, system-ui, sans-serif; }
      .body { fill: #475569; font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; }
      .footer { fill: #334155; font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#page-bg)"/>
  <path d="M74 603 C325 550 514 486 668 406 C842 315 966 224 1115 133" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M92 597 C335 548 530 480 687 398 C858 309 976 219 1103 145" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.55"/>

  <text class="title" x="76" y="72">Four Agent Coding Modes</text>
  <text class="subtitle" x="78" y="104">Choose the lightest ritual that still controls scope, risk, and evidence.</text>

  <g transform="translate(80 608)">
    <rect x="0" y="-23" width="268" height="34" rx="8" fill="#ffffff" opacity="0.86"/>
    <text class="axis-label" x="18" y="0">Local, fast, reversible</text>
  </g>
  <g transform="translate(824 142)">
    <rect x="0" y="-23" width="294" height="34" rx="8" fill="#ffffff" opacity="0.86"/>
    <text class="axis-label" x="18" y="0">Cross-cutting, durable, risky</text>
  </g>

  <g transform="translate(86 336)">
    <rect width="254" height="236" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect width="254" height="8" rx="8" fill="#ef6b5a"/>
    <circle cx="31" cy="39" r="17" fill="#ef6b5a"/>
    <text class="level" x="26" y="45">1</text>
    <text class="card-title" x="58" y="37">Controlled</text>
    <text class="card-title" x="58" y="64">Vibe Coding</text>
    <text class="label" x="28" y="96">Scope</text>
    <text class="body" x="28" y="119">Micro UX, copy, prompts</text>
    <text class="label" x="28" y="148">Ritual</text>
    <text class="body" x="28" y="171">Conversation + repo rules</text>
    <text class="label" x="28" y="200">Proof</text>
    <text class="body" x="28" y="223">Quick check or small test</text>
  </g>

  <g transform="translate(362 292)">
    <rect width="254" height="236" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect width="254" height="8" rx="8" fill="#f4a62a"/>
    <circle cx="31" cy="39" r="17" fill="#f4a62a"/>
    <text class="level" x="26" y="45">2</text>
    <text class="card-title" x="58" y="37">Guided</text>
    <text class="card-title" x="58" y="64">Coding</text>
    <text class="label" x="28" y="96">Scope</text>
    <text class="body" x="28" y="119">Bounded fix or integration</text>
    <text class="label" x="28" y="148">Ritual</text>
    <text class="body" x="28" y="171">Short brief, plan, tracker</text>
    <text class="label" x="28" y="200">Proof</text>
    <text class="body" x="28" y="223">Targeted tests and evidence</text>
  </g>

  <g transform="translate(638 248)">
    <rect width="254" height="236" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect width="254" height="8" rx="8" fill="#18a999"/>
    <circle cx="31" cy="39" r="17" fill="#18a999"/>
    <text class="level" x="26" y="45">3</text>
    <text class="card-title" x="58" y="37">Spec-Driven</text>
    <text class="card-title" x="58" y="64">Feature</text>
    <text class="label" x="28" y="96">Scope</text>
    <text class="body" x="28" y="119">Reviewable feature or API</text>
    <text class="label" x="28" y="148">Ritual</text>
    <text class="body" x="28" y="171">Spec, plan, task list</text>
    <text class="label" x="28" y="200">Proof</text>
    <text class="body" x="28" y="223">PR validation set</text>
  </g>

  <g transform="translate(914 204)">
    <rect width="254" height="236" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <rect width="254" height="8" rx="8" fill="#4263eb"/>
    <circle cx="31" cy="39" r="17" fill="#4263eb"/>
    <text class="level" x="26" y="45">4</text>
    <text class="card-title" x="58" y="37">Foundation</text>
    <text class="card-title" x="58" y="64">Evolution</text>
    <text class="label" x="28" y="96">Scope</text>
    <text class="body" x="28" y="119">Template, rules, shared stack</text>
    <text class="label" x="28" y="148">Ritual</text>
    <text class="body" x="28" y="171">Isolated change, strict review</text>
    <text class="label" x="28" y="200">Proof</text>
    <text class="body" x="28" y="223">Compatibility evidence</text>
  </g>

  <g transform="translate(306 652)">
    <rect x="0" y="-27" width="590" height="47" rx="8" fill="#ffffff" stroke="#d8e2ea"/>
    <text class="footer" x="28" y="3">Ceremony and evidence increase with blast radius.</text>
  </g>
</svg>
