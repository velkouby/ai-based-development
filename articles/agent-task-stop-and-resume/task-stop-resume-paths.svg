<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Three Stops, Three Paths to Resume</title>
  <desc id="desc">A three-branch workflow showing how a missing decision, a scope violation, and a repairable failure require different authorities and actions before a new compiled attempt can begin.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset in="blur" dx="0" dy="5" result="offsetBlur"/>
      <feFlood flood-color="#07162d" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadowShape"/>
      <feMerge>
        <feMergeNode in="shadowShape"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" markerWidth="14" markerHeight="14" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#607089"/>
    </marker>
    <style>
      .font { font-family: "Noto Sans", "DejaVu Sans", sans-serif; }
      .navy { fill: #07162d; }
      .muted { fill: #52627a; }
      .card { fill: #f7f9fc; stroke: #d9e1ec; stroke-width: 2; }
      .connector { fill: none; stroke: #607089; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .section-label { font-size: 24px; font-weight: 800; letter-spacing: 1.2px; }
      .body { font-size: 24px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <g class="font">
    <text x="800" y="76" text-anchor="middle" class="navy" font-size="54" font-weight="800">Three Stops, Three Paths to Resume</text>
    <text x="800" y="122" text-anchor="middle" class="muted" font-size="28" font-weight="500">The reason for stopping determines the authority, action, and legitimate restart.</text>

    <rect x="620" y="150" width="360" height="64" rx="32" fill="#ffffff" stroke="#07162d" stroke-width="3" filter="url(#shadow)"/>
    <rect x="640" y="170" width="24" height="24" rx="4" fill="#f47b20"/>
    <text x="692" y="192" class="navy" font-size="28" font-weight="800">STOP DETECTED</text>

    <path d="M800 214 V230 H300 V245" class="connector" marker-end="url(#arrow)"/>
    <path d="M800 214 V245" class="connector" marker-end="url(#arrow)"/>
    <path d="M800 214 V230 H1300 V245" class="connector" marker-end="url(#arrow)"/>

    <!-- Missing decision -->
    <g filter="url(#shadow)">
      <rect x="70" y="250" width="460" height="415" rx="22" class="card"/>
      <path d="M92 250 H508 A22 22 0 0 1 530 272" fill="none" stroke="#f47b20" stroke-width="8" stroke-linecap="round"/>
    </g>
    <circle cx="115" cy="299" r="27" fill="#fff3e8" stroke="#f47b20" stroke-width="3"/>
    <text x="115" y="308" text-anchor="middle" class="navy" font-size="24" font-weight="800">01</text>
    <text x="158" y="307" class="navy" font-size="28" font-weight="800">MISSING DECISION</text>
    <text x="110" y="347" class="muted" font-size="24" font-weight="600">Before coding</text>
    <line x1="110" y1="369" x2="490" y2="369" stroke="#d9e1ec" stroke-width="2"/>
    <text x="110" y="408" fill="#b94f00" class="section-label">AUTHORITY</text>
    <text x="110" y="442" class="navy body">Product, architecture, security,</text>
    <text x="110" y="473" class="navy body">or domain owner</text>
    <text x="110" y="513" fill="#b94f00" class="section-label">ACTION</text>
    <text x="110" y="547" class="navy body">Record the decision</text>
    <text x="110" y="578" class="navy body">Update the governing input</text>
    <text x="110" y="618" fill="#b94f00" class="section-label">RESUME POINT</text>
    <text x="110" y="652" class="navy body">Recompile the work</text>

    <!-- Scope violation -->
    <g filter="url(#shadow)">
      <rect x="570" y="250" width="460" height="415" rx="22" class="card"/>
      <path d="M592 250 H1008 A22 22 0 0 1 1030 272" fill="none" stroke="#7a4fd3" stroke-width="8" stroke-linecap="round"/>
    </g>
    <circle cx="615" cy="299" r="27" fill="#f1ebfb" stroke="#7a4fd3" stroke-width="3"/>
    <text x="615" y="308" text-anchor="middle" class="navy" font-size="24" font-weight="800">02</text>
    <text x="658" y="307" class="navy" font-size="28" font-weight="800">SCOPE VIOLATION</text>
    <text x="610" y="347" class="muted" font-size="24" font-weight="600">Observed after writing</text>
    <line x1="610" y1="369" x2="990" y2="369" stroke="#d9e1ec" stroke-width="2"/>
    <text x="610" y="408" fill="#6438bc" class="section-label">AUTHORITY</text>
    <text x="610" y="442" class="navy body">Task lead + foundation owner</text>
    <text x="610" y="473" class="navy body">when shared code is involved</text>
    <text x="610" y="513" fill="#6438bc" class="section-label">ACTION</text>
    <text x="610" y="547" class="navy body">Isolate or remove the change</text>
    <text x="610" y="578" class="navy body">Split or reclassify the work</text>
    <text x="610" y="618" fill="#6438bc" class="section-label">RESUME POINT</text>
    <text x="610" y="652" class="navy body">Start from a valid scope</text>

    <!-- Repairable failure -->
    <g filter="url(#shadow)">
      <rect x="1070" y="250" width="460" height="415" rx="22" class="card"/>
      <path d="M1092 250 H1508 A22 22 0 0 1 1530 272" fill="none" stroke="#1f9d66" stroke-width="8" stroke-linecap="round"/>
    </g>
    <circle cx="1115" cy="299" r="27" fill="#e7f7f0" stroke="#1f9d66" stroke-width="3"/>
    <text x="1115" y="308" text-anchor="middle" class="navy" font-size="24" font-weight="800">03</text>
    <text x="1158" y="307" class="navy" font-size="28" font-weight="800">REPAIRABLE FAILURE</text>
    <text x="1110" y="347" class="muted" font-size="24" font-weight="600">Validation or mechanical step</text>
    <line x1="1110" y1="369" x2="1490" y2="369" stroke="#d9e1ec" stroke-width="2"/>
    <text x="1110" y="408" fill="#14784d" class="section-label">AUTHORITY</text>
    <text x="1110" y="442" class="navy body">Agent or developer</text>
    <text x="1110" y="473" class="navy body">within a bounded policy</text>
    <text x="1110" y="513" fill="#14784d" class="section-label">ACTION</text>
    <text x="1110" y="547" class="navy body">Fix the diagnosed cause</text>
    <text x="1110" y="578" class="navy body">Rerun affected checks</text>
    <text x="1110" y="618" fill="#14784d" class="section-label">RESUME POINT</text>
    <text x="1110" y="652" class="navy body">New attempt, same contract</text>

    <path d="M300 665 V705 H800" class="connector"/>
    <path d="M800 665 V742" class="connector" marker-end="url(#arrow)"/>
    <path d="M1300 665 V705 H800" class="connector"/>

    <g filter="url(#shadow)">
      <rect x="310" y="750" width="980" height="105" rx="24" fill="#ffffff" stroke="#2f6fdd" stroke-width="3"/>
    </g>
    <circle cx="372" cy="802" r="35" fill="#eaf1fd" stroke="#2f6fdd" stroke-width="3"/>
    <text x="372" y="811" text-anchor="middle" class="navy" font-size="24" font-weight="800">N+1</text>
    <text x="430" y="796" class="navy" font-size="32" font-weight="800">NEW COMPILED ATTEMPT</text>
    <text x="430" y="832" class="muted" font-size="24" font-weight="600">Updated authority  •  explicit scope  •  previous stop preserved</text>
  </g>
</svg>
