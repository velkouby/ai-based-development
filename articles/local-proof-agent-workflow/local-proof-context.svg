<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">From Failure to Reviewable Evidence</title>
  <desc id="desc">A first customer-pagination attempt needs retry after a frontend test fails. A bounded repair leads to a second attempt where three targeted commands pass. The current HEAD, observed paths, retained history, missing result commit, and unrun global quality check remain visible.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset in="blur" dx="0" dy="5" result="offsetBlur"/>
      <feFlood flood-color="#07162d" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadowShape"/>
      <feMerge>
        <feMergeNode in="shadowShape"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L12,7 L1,13 Z" fill="#2f6fdd"/>
    </marker>
    <style>
      .font { font-family: "Noto Sans", "DejaVu Sans", sans-serif; }
      .navy { fill: #07162d; }
      .muted { fill: #52627a; }
      .label { font-size: 21px; font-weight: 800; letter-spacing: 1.2px; }
      .body { font-size: 24px; font-weight: 650; }
      .small { font-size: 21px; font-weight: 550; }
      .context-card { fill: #f7f9fc; stroke: #d9e1ec; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <g class="font">
    <text x="800" y="76" text-anchor="middle" class="navy" font-size="52" font-weight="850">From Failure to Reviewable Evidence</text>
    <text x="800" y="122" text-anchor="middle" class="muted" font-size="27" font-weight="500">The latest green result keeps its revision, scope, history, and gaps attached.</text>

    <!-- Attempt 001 -->
    <g filter="url(#shadow)">
      <rect x="55" y="176" width="470" height="260" rx="26" fill="#fffaf5" stroke="#f47b20" stroke-width="3"/>
    </g>
    <circle cx="112" cy="227" r="28" fill="#fff3e8" stroke="#f47b20" stroke-width="3"/>
    <path d="M99 214 L125 240 M125 214 L99 240" stroke="#b94f00" stroke-width="6" stroke-linecap="round"/>
    <text x="158" y="218" fill="#b94f00" class="label">ATTEMPT 001</text>
    <text x="158" y="258" class="navy" font-size="31" font-weight="850">NEEDS RETRY</text>
    <line x1="92" y1="286" x2="488" y2="286" stroke="#f1d8c5" stroke-width="2"/>
    <text x="92" y="330" class="navy body">make test-front · exit 1</text>
    <text x="92" y="370" fill="#b94f00" class="small">Next remained enabled</text>
    <text x="92" y="407" class="muted small">Backend test + build: exit 0</text>

    <!-- Retry arrow -->
    <path d="M545 318 H612" fill="none" stroke="#2f6fdd" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="579" y="263" text-anchor="middle" fill="#2459b6" font-size="17" font-weight="800">BOUNDED</text>
    <text x="579" y="284" text-anchor="middle" fill="#2459b6" font-size="17" font-weight="800">REPAIR</text>

    <!-- Attempt 002 -->
    <g filter="url(#shadow)">
      <rect x="635" y="160" width="910" height="292" rx="30" fill="#ffffff" stroke="#1f9d66" stroke-width="4"/>
    </g>
    <circle cx="718" cy="245" r="54" fill="#e7f7f0" stroke="#1f9d66" stroke-width="4"/>
    <path d="M690 246 L710 266 L748 225" fill="none" stroke="#14784d" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="800" y="207" fill="#14784d" class="label">ATTEMPT 002</text>
    <text x="800" y="263" class="navy" font-size="45" font-weight="900">PASSED</text>
    <rect x="800" y="285" width="675" height="48" rx="24" fill="#e7f7f0"/>
    <text x="1138" y="317" text-anchor="middle" fill="#14784d" font-size="23" font-weight="800">3 TARGETED COMMANDS · EXIT 0</text>
    <line x1="685" y1="360" x2="1495" y2="360" stroke="#d9e1ec" stroke-width="2"/>
    <text x="685" y="402" class="muted" font-size="22" font-weight="650">Bounded repair</text>
    <text x="895" y="402" class="navy" font-size="22" font-weight="750">frontend/customers/customer-list.tsx</text>

    <!-- Context cards -->
    <g filter="url(#shadow)">
      <rect x="55" y="500" width="350" height="190" rx="22" class="context-card"/>
      <rect x="435" y="500" width="350" height="190" rx="22" class="context-card"/>
      <rect x="815" y="500" width="350" height="190" rx="22" class="context-card"/>
      <rect x="1195" y="500" width="350" height="190" rx="22" class="context-card"/>
    </g>

    <circle cx="99" cy="546" r="23" fill="#eaf1fd" stroke="#2f6fdd" stroke-width="3"/>
    <text x="99" y="554" text-anchor="middle" class="navy" font-size="22" font-weight="850">R</text>
    <text x="138" y="553" fill="#2459b6" class="label">REVISION</text>
    <text x="92" y="605" class="navy body">Current HEAD: 7a31c42</text>
    <text x="92" y="650" fill="#b94f00" class="small">Result commit: NULL</text>

    <circle cx="479" cy="546" r="23" fill="#f1ebfb" stroke="#7a4fd3" stroke-width="3"/>
    <text x="479" y="554" text-anchor="middle" class="navy" font-size="22" font-weight="850">C</text>
    <text x="518" y="553" fill="#6438bc" class="label">COMMANDS</text>
    <text x="472" y="605" class="navy body">3 targeted checks</text>
    <text x="472" y="650" class="muted small">All exit 0 on attempt 002</text>

    <circle cx="859" cy="546" r="23" fill="#e7f7f0" stroke="#1f9d66" stroke-width="3"/>
    <text x="859" y="554" text-anchor="middle" class="navy" font-size="22" font-weight="850">S</text>
    <text x="898" y="553" fill="#14784d" class="label">SCOPE</text>
    <text x="852" y="605" class="navy body">5 observed paths</text>
    <text x="852" y="650" fill="#14784d" class="small">Path policy: PASSED</text>

    <circle cx="1239" cy="546" r="23" fill="#fff3e8" stroke="#f47b20" stroke-width="3"/>
    <text x="1239" y="554" text-anchor="middle" class="navy" font-size="22" font-weight="850">G</text>
    <text x="1278" y="553" fill="#b94f00" class="label">HISTORY + GAP</text>
    <text x="1232" y="605" class="navy body">Attempt 001 retained</text>
    <text x="1232" y="650" fill="#b94f00" class="small">Global quality: NOT RUN</text>

    <!-- Footer statement -->
    <g filter="url(#shadow)">
      <rect x="195" y="758" width="1210" height="102" rx="51" fill="#07162d"/>
    </g>
    <text x="800" y="820" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="850">THE LATEST GREEN DOES NOT ERASE THE HISTORY</text>
  </g>
</svg>
